# ============================================================
#  Slide Rule Configuration — Linear
# ============================================================
#
#  Conventions
#  -----------
#  • direction:  "up"   = ticks grow upward
#                "down" = ticks grow downward
#  • inverted:   true  → the scale reads backwards (CI, DI, …)
#  • offset:     distance from bottom of rule (mm)
#  • Tick tuples: [step, height_mm]
#      height 8.0 = major  (gets a numeric label)
#      height 7.0 = half-decade
#      height 6.0 = medium
#      height 5.0 = sub-medium
#      height 4.0 = minor
#      height 3.0 = finest
#  • Sections split the domain into zones of differing density.
#  • Shared definitions use YAML anchors (&name) and aliases
#    (*name) so that e.g. D reuses C's transform and sections.
# ============================================================


# ----------------------------------------------------------
#  Global settings
# ----------------------------------------------------------
global:
  type: linear
  rule_length_mm: 250.0

  layers:
    SLIDE:  { color: 5 }          # blue  — movable tongue
    STATOR: { color: 3 }          # green — fixed body


# ----------------------------------------------------------
#  Layout
# ----------------------------------------------------------
#
#  Scales are grouped by part (stator / slide).
#  offset = distance from bottom of the rule (mm).
# ----------------------------------------------------------
layout:

  stator:

    - name: K
      offset: 160.0
      direction: up
      transform: "(1/3) * log10(x)"
      label_height: 8.0
      label_tilt: 0.0
      name_label: { angle_deg: 83.0, linear_offset_x: -5.0 }
      sections:
        - { start: 1.0,    end: 2.0,    ticks: [[1.0,8.0],[0.5,7.0],[0.1,6.0],[0.05,5.0],[0.01,4.0]] }
        - { start: 2.0,    end: 5.0,    ticks: [[1.0,8.0],[0.5,7.0],[0.1,6.0],[0.05,5.0],[0.02,4.0]] }
        - { start: 5.0,    end: 10.0,   ticks: [[1.0,8.0],[0.5,7.0],[0.1,6.0],[0.05,5.0]] }
        - { start: 10.0,   end: 20.0,   ticks: [[10.0,8.0],[5.0,7.0],[1.0,6.0],[0.5,5.0],[0.1,4.0]] }
        - { start: 20.0,   end: 50.0,   ticks: [[10.0,8.0],[5.0,7.0],[1.0,6.0],[0.5,5.0],[0.2,4.0]] }
        - { start: 50.0,   end: 100.0,  ticks: [[10.0,8.0],[5.0,7.0],[1.0,6.0],[0.5,5.0]] }
        - { start: 100.0,  end: 200.0,  ticks: [[100.0,8.0],[50.0,7.0],[10.0,6.0],[5.0,5.0],[1.0,4.0]] }
        - { start: 200.0,  end: 500.0,  ticks: [[100.0,8.0],[50.0,7.0],[10.0,6.0],[5.0,5.0],[2.0,4.0]] }
        - { start: 500.0,  end: 1000.0, ticks: [[100.0,8.0],[50.0,7.0],[10.0,6.0],[5.0,5.0]] }

    - name: A
      offset: 141.0
      direction: up
      transform: &A_transform "0.5 * log10(x)"
      label_height: &A_label_height 8.0
      label_tilt: &A_label_tilt 0.0
      name_label: &A_name_label { angle_deg: 83.0, linear_offset_x: -5.0 }
      sections: &A_sections
        - { start: 1.0,   end: 2.0,   ticks: [[1.0,8.0],[0.5,7.0],[0.1,6.0],[0.05,5.0],[0.01,4.0]] }
        - { start: 2.0,   end: 5.0,   ticks: [[1.0,8.0],[0.5,7.0],[0.1,6.0],[0.05,5.0],[0.02,4.0]] }
        - { start: 5.0,   end: 10.0,  ticks: [[1.0,8.0],[0.5,7.0],[0.1,6.0],[0.05,5.0]] }
        - { start: 10.0,  end: 20.0,  ticks: [[10.0,8.0],[5.0,7.0],[1.0,6.0],[0.5,5.0],[0.1,4.0]] }
        - { start: 20.0,  end: 50.0,  ticks: [[10.0,8.0],[5.0,7.0],[1.0,6.0],[0.5,5.0],[0.2,4.0]] }
        - { start: 50.0,  end: 100.0, ticks: [[10.0,8.0],[5.0,7.0],[1.0,6.0],[0.5,5.0]] }

    - name: D
      offset: 79.0
      direction: down
      transform: &C_transform "log10(x)"
      label_height: &C_label_height 8.0
      label_tilt: &C_label_tilt 0.0
      name_label: &C_name_label { angle_deg: 83.0, linear_offset_x: -5.0 }
      sections: &C_sections
        - { start: 1.0,  end: 2.0,  ticks: [[1.0,8.0],[0.5,7.0],[0.1,6.0],[0.05,5.0],[0.01,4.0],[0.005,3.0]] }
        - { start: 2.0,  end: 4.0,  ticks: [[1.0,8.0],[0.5,7.0],[0.1,6.0],[0.05,5.0],[0.01,4.0]] }
        - { start: 4.0,  end: 6.0,  ticks: [[1.0,8.0],[0.5,7.0],[0.1,6.0],[0.05,5.0],[0.02,4.0]] }
        - { start: 6.0,  end: 10.0, ticks: [[1.0,8.0],[0.5,7.0],[0.1,6.0],[0.05,5.0],[0.02,4.0]] }

    - name: S
      offset: 60.0
      direction: down
      transform: "log10(sin(rad(x))) + 1.0"
      label_height: 8.0
      label_tilt: 0.0
      name_label: { angle_deg: 73.0, linear_offset_x: -5.0 }
      complement:
        full_angle: 90.0
        label_height: 8.0
        text_height: 2.0
      sections:
        - { start: 5.7,  end: 10.0, ticks: [[1.0,8.0],[0.5,6.0],[0.1,5.0],[0.05,4.0]] }
        - { start: 10.0, end: 20.0, ticks: [[5.0,8.0],[1.0,6.0],[0.5,5.0],[0.1,4.0]] }
        - { start: 20.0, end: 30.0, ticks: [[5.0,8.0],[1.0,6.0],[0.5,5.0],[0.2,4.0]] }
        - { start: 30.0, end: 60.0, ticks: [[10.0,8.0],[5.0,6.0],[1.0,5.0],[0.5,4.0]] }
        - { start: 60.0, end: 90.0, ticks: [[10.0,8.0],[5.0,6.0],[1.0,4.0]] }

    - name: ST
      offset: 40.0
      direction: down
      transform: "log10(sin(rad(x))) + 2.0"
      label_height: 8.0
      label_tilt: 0.0
      name_label: { angle_deg: 73.0, linear_offset_x: -5.0 }
      sections:
        - { start: 0.5, end: 1.0, ticks: [[0.1,8.0],[0.05,6.0],[0.01,4.0]] }
        - { start: 1.0, end: 2.0, ticks: [[0.5,8.0],[0.1,6.0],[0.05,5.0],[0.01,4.0]] }
        - { start: 2.0, end: 4.0, ticks: [[1.0,8.0],[0.5,6.0],[0.1,5.0],[0.05,4.0]] }
        - { start: 4.0, end: 6.0, ticks: [[1.0,8.0],[0.5,6.0],[0.1,5.0],[0.05,4.0]] }

    - name: T
      offset: 20.0
      direction: down
      transform: "log10(tan(rad(x))) + 1.0"
      label_height: 8.0
      label_tilt: 0.0
      name_label: { angle_deg: 73.0, linear_offset_x: -5.0 }
      complement:
        full_angle: 90.0
        label_height: 8.0
        text_height: 2.0
      sections:
        - { start: 5.7,  end: 10.0, ticks: [[1.0,8.0],[0.5,6.0],[0.1,5.0],[0.05,4.0]] }
        - { start: 10.0, end: 20.0, ticks: [[5.0,8.0],[1.0,6.0],[0.5,5.0],[0.1,4.0]] }
        - { start: 20.0, end: 30.0, ticks: [[5.0,8.0],[1.0,6.0],[0.5,5.0],[0.2,4.0]] }
        - { start: 30.0, end: 45.0, ticks: [[5.0,8.0],[1.0,6.0],[0.5,5.0]] }

    - name: L
      offset: 0.0
      direction: down
      transform: "x"
      label_height: 8.0
      label_tilt: 0.0
      name_label: { angle_deg: 83.0, linear_offset_x: -5.0 }
      sections:
        - { start: 0.0, end: 0.5, ticks: [[0.1,8.0],[0.05,6.0],[0.01,5.0],[0.005,3.0]] }
        - { start: 0.5, end: 1.0, ticks: [[0.1,8.0],[0.05,6.0],[0.01,5.0],[0.005,3.0]] }


  slide:

    - name: B
      offset: 139.0
      direction: down
      transform: *A_transform
      label_height: *A_label_height
      label_tilt: *A_label_tilt
      name_label: *A_name_label
      sections: *A_sections

    - name: CF
      offset: 120.0
      direction: up
      transform: "(log10(x) - log10(pi)) % 1.0"
      label_height: 8.0
      label_tilt: 0.0
      name_label: { angle_deg: 73.0, linear_offset_x: -5.0 }
      sections:
        - { start: 3.14159, end: 4.0,     ticks: [[1.0,8.0],[0.5,7.0],[0.1,6.0],[0.05,5.0],[0.01,4.0]] }
        - { start: 4.0,     end: 6.0,     ticks: [[1.0,8.0],[0.5,7.0],[0.1,6.0],[0.05,5.0],[0.02,4.0]] }
        - { start: 6.0,     end: 10.0,    ticks: [[1.0,8.0],[0.5,7.0],[0.1,6.0],[0.05,5.0],[0.02,4.0]] }
        - { start: 1.0,     end: 2.0,     ticks: [[1.0,8.0],[0.5,7.0],[0.1,6.0],[0.05,5.0],[0.01,4.0],[0.005,3.0]] }
        - { start: 2.0,     end: 3.14159, ticks: [[1.0,8.0],[0.5,7.0],[0.1,6.0],[0.05,5.0],[0.01,4.0]] }

    - name: CI
      offset: 100.0
      direction: up
      inverted: true
      transform: *C_transform
      label_height: *C_label_height
      label_tilt: *C_label_tilt
      name_label: *C_name_label
      sections: *C_sections

    - name: C
      offset: 81.0
      direction: up
      transform: *C_transform
      label_height: *C_label_height
      label_tilt: *C_label_tilt
      name_label: *C_name_label
      sections: *C_sections
