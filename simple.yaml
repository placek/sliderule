# ============================================================
#  Slide Rule Configuration — Simple circular
# ============================================================

global:
  type: circular
  center: [0.0, 0.0]

  layers:
    SLIDE:  { color: 5 }          # blue  — movable tongue
    STATOR: { color: 3 }          # green — fixed body

layout:
  slide:
    - name: C
      offset: 86.0
      direction: up
      transform: "log10(x)"
      label_height: 3.0
      label_tilt: 0.0
      name_label:
        angle_deg: 85.0
        linear_offset_x: -5.0
      sections: &C_sections
        - { start: 1.0,  end: 2.0,  ticks: [[1.0,3.0],[0.5,2.5],[0.1,2.0],[0.05,1.5],[0.01,1.0],[0.005,0.5]] }
        - { start: 2.0,  end: 6.0,  ticks: [[1.0,3.0],[0.5,2.5],[0.1,2.0],[0.05,1.5],[0.01,1.0]] }
        - { start: 6.0,  end: 10.0, ticks: [[1.0,3.0],[0.5,2.5],[0.1,2.0],[0.02,1.5]] }

    - name: CI
      offset: 96.0
      direction: up
      inverted: true
      transform: "log10(x)"
      label_height: 3.0
      label_tilt: 0.0
      name_label:
        angle_deg: 85.0
        linear_offset_x: -5.0
      sections: *C_sections

    - name: CF
      offset: 106.0
      direction: up
      transform: "(log10(x) - log10(pi)) % 1.0"
      label_height: 3.0
      label_tilt: 0.0
      name_label:
        angle_deg: 85.0
        linear_offset_x: -5.0
      sections: *C_sections

    - name: A
      offset: 116.0
      direction: up
      transform: "0.5 * log10(x)"
      label_height: 3.0
      label_tilt: 0.0
      name_label:
        angle_deg: 85.0
        linear_offset_x: -5.0
      sections:
        - { start: 1.0,  end: 2.0,   ticks: [[1.0,3.0],[0.5,2.5],[0.1,2.0],[0.05,1.5],[0.01,1.0],[0.005,0.5]] }
        - { start: 2.0,  end: 6.0,   ticks: [[1.0,3.0],[0.5,2.5],[0.1,2.0],[0.05,1.5],[0.01,1.0]] }
        - { start: 6.0,  end: 10.0,  ticks: [[1.0,3.0],[0.5,2.5],[0.1,2.0],[0.02,1.5]] }
        - { start: 10.0, end: 20.0,  ticks: [[10.0,3.0],[5.0,2.5],[1.0,2.0],[0.5,1.5],[0.1,1.0],[0.05,0.5]] }
        - { start: 20.0, end: 60.0,  ticks: [[10.0,3.0],[5.0,2.5],[1.0,2.0],[0.5,1.5],[0.1,1.0]] }
        - { start: 60.0, end: 100.0, ticks: [[10.0,3.0],[5.0,2.5],[1.0,2.0],[0.2,1.5]] }

  stator:
    - name: L
      offset: 45.0
      direction: down
      transform: "x"
      label_height: 3.0
      label_tilt: 0.0
      name_label:
        angle_deg: 85.0
        linear_offset_x: -5.0
      sections:
        - { start: 0.0, end: 1.0, ticks: [[0.1,3.0],[0.05,2.5],[0.01,2.0],[0.002,1.0]] }

    - name: T
      offset: 55.0
      direction: down
      transform: "log10(tan(rad(x))) + 1.0"
      label_height: 3.0
      label_tilt: 0.0
      name_label:
        angle_deg: 85.0
        linear_offset_x: -5.0
      complement:
        full_angle: 90.0
        label_height: 3.0
        text_height: 2.0
      sections:
        - { start: 5.0, end: 15.0,  ticks: [[5.0,3.0],[1.0,2.0],[0.5,1.0],[0.1,0.5]] }
        - { start: 15.0, end: 35.0, ticks: [[5.0,3.0],[1.0,2.0],[0.2,1.0]] }
        - { start: 35.0, end: 45.0, ticks: [[5.0,3.0],[1.0,2.0],[0.5,1.0]] }

    - name: ST
      offset: 65.0
      direction: down
      transform: "log10(sin(rad(x))) + 2.0"
      label_height: 3.0
      label_tilt: 0.0
      name_label:
        angle_deg: 95.0
        linear_offset_x: -5.0
      sections:
        - { start: 0.5, end: 1.0, ticks: [[0.1,3.0],[0.05,2.0],[0.01,1.0]] }
        - { start: 1.0, end: 2.0, ticks: [[0.5,3.0],[0.1, 2.0],[0.05,1.0],[0.01,0.5]] }
        - { start: 2.0, end: 4.0, ticks: [[1.0,3.0],[0.5, 2.0],[0.1, 1.0],[0.05,0.5]] }
        - { start: 4.0, end: 6.0, ticks: [[1.0,3.0],[0.5, 2.0],[0.1, 1.0],[0.05,0.5]] }

    - name: S
      offset: 75.0
      direction: down
      transform: "log10(sin(rad(x))) + 1.0"
      label_height: 3.0
      label_tilt: 0.0
      name_label:
        angle_deg: 85.0
        linear_offset_x: -5.0
      complement:
        full_angle: 90.0
        label_height: 3.0
        text_height: 2.0
      sections:
        - { start: 5.7,  end: 10.0, ticks: [[1.0, 3.0],[0.5,2.0],[0.1,1.0],[0.05,0.5]] }
        - { start: 10.0, end: 20.0, ticks: [[5.0, 3.0],[1.0,2.0],[0.5,1.0],[0.1, 0.5]] }
        - { start: 20.0, end: 30.0, ticks: [[5.0, 3.0],[1.0,2.0],[0.5,1.0],[0.2, 0.5]] }
        - { start: 30.0, end: 60.0, ticks: [[10.0,3.0],[5.0,2.0],[1.0,1.0],[0.5, 0.5]] }
        - { start: 60.0, end: 90.0, ticks: [[10.0,3.0],[5.0,2.0],[1.0,1.0]] }

    - name: D
      offset: 85.0
      direction: down
      transform: "log10(x)"
      label_height: 3.0
      label_tilt: 0.0
      name_label:
        angle_deg: 85.0
        linear_offset_x: -5.0
      sections: *C_sections
